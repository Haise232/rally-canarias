spring.application.name=canarias

# Puerto dinamico para Render
server.port=${PORT:8080}

# Configuracion PostgreSQL (variables de entorno de Render)
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/canarias}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Desactivar Spring Security temporalmente para desarrollo frontend
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration
