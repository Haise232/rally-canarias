spring.application.name=canarias

# Puerto dinamico para Render
server.port=${PORT:8080}

# Configuracion H2 (desarrollo local - sin PostgreSQL)
spring.datasource.url=jdbc:h2:mem:canariasdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# Desactivar Spring Security temporalmente para desarrollo frontend
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration
